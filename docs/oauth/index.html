<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Keeper — Autenticação</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a16;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #14142e;
      border: 1px solid #2a2a5a;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    h1 { color: #eab308; font-size: 1.4rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.5; }
    .error { color: #ef4444; }
  </style>
  <script>
    const DEEP_LINK_SCHEME = 'com.googleusercontent.apps.288890427052-gp0llktopdorl4mfdf1oj99dprq34ivq';

    function redirect() {
      const search = window.location.search;

      // Check for OAuth error
      const params = new URLSearchParams(search);
      if (params.get('error')) {
        document.getElementById('icon').textContent = '❌';
        document.getElementById('title').textContent = 'Autorização cancelada';
        document.getElementById('msg').textContent = 'Volte ao Password Keeper e tente novamente.';
        return;
      }

      if (!search) {
        document.getElementById('icon').textContent = '⚠️';
        document.getElementById('title').textContent = 'Parâmetros ausentes';
        document.getElementById('msg').textContent = 'Acesse esta página pelo fluxo de autenticação do Password Keeper.';
        return;
      }

      // JS redirect — this DOES trigger Android intents in Chrome
      window.location.href = DEEP_LINK_SCHEME + ':/oauth2redirect' + search;

      // Fallback message if redirect doesn't open the app
      setTimeout(() => {
        document.getElementById('msg').textContent =
          'Se o app não abrir automaticamente, volte ao Password Keeper manualmente.';
      }, 1500);
    }

    window.onload = redirect;
  </script>
</head>
<body>
  <div class="card">
    <span class="icon" id="icon">🔐</span>
    <h1 id="title">Redirecionando ao app...</h1>
    <p id="msg">Aguarde um momento.</p>
  </div>
</body>
</html>
