# ─────────────────────────────────────────────────────────────────────────────
# Password Keeper — Release workflow
#
# Dispara quando uma tag "v*" é criada (ex: v1.0.0, v0.2.3).
# Gera binários para: Linux (.AppImage + .deb), Windows (.msi + .exe),
#                     macOS (.dmg) e Android (.apk).
#
# Pré-requisito no repositório:
#   Settings → Actions → General → Workflow permissions → Read and write permissions
#
# GitHub Secrets necessários:
#   VITE_GOOGLE_CLIENT_ID        — Google OAuth Client ID
#   VITE_GOOGLE_CLIENT_SECRET    — Google OAuth Client Secret
#
# Secrets opcionais para assinatura consistente do APK Android:
#   ANDROID_KEYSTORE_B64         — Keystore .jks codificado em Base64
#                                   (gerado com: base64 -w0 release.jks)
#   ANDROID_KEY_ALIAS            — Alias da chave (padrão: passwordkeeper)
#   ANDROID_STORE_PASSWORD       — Senha do keystore
#   ANDROID_KEY_PASSWORD         — Senha da chave
#
#   Se os secrets Android não forem configurados, uma keystore temporária é
#   gerada automaticamente — o APK funciona para side-loading, mas usuários
#   precisarão desinstalar antes de atualizar (chave muda a cada build).
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Desktop (Linux / Windows / macOS) ──────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust_target: ''
            tauri_args: ''

          - os: windows-latest
            rust_target: ''
            tauri_args: ''

          - os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'

          - os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar se a tag está na branch master
        shell: bash
        run: |
          git fetch origin master
          if ! git branch -r --contains "${{ github.sha }}" | grep -qE "origin/master"; then
            echo "❌ Tag não está na branch master. Build cancelado."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Instalar dependências Node
        run: npm ci

      - name: Sincronizar versão com a tag
        run: node scripts/sync-version.js ${{ github.ref_name }}

      - name: Build e publicar na release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Password Keeper ${{ github.ref_name }}'
          releaseBody: |
            ## Password Keeper ${{ github.ref_name }}

            ### Downloads
            | Plataforma | Arquivo |
            |---|---|
            | Linux | `.AppImage` ou `.deb` |
            | Windows | `.msi` ou `.exe` |
            | macOS Intel | `.dmg` (x86_64) |
            | macOS Apple Silicon | `.dmg` (aarch64) |
            | Android | `.apk` (side-loading) |

            > Os arquivos aparecem abaixo em **Assets** após todos os builds concluírem.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.tauri_args }}

  # ── Android ────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar se a tag está na branch master
        shell: bash
        run: |
          git fetch origin master
          if ! git branch -r --contains "${{ github.sha }}" | grep -qE "origin/master"; then
            echo "❌ Tag não está na branch master. Build cancelado."
            exit 1
          fi

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar NDK e componentes Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;27.0.11902837"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Rust stable + targets Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências Node
        run: npm ci

      - name: Sincronizar versão com a tag
        run: node scripts/sync-version.js ${{ github.ref_name }}

      - name: Preparar keystore para assinatura
        shell: bash
        run: |
          if [ -n "$ANDROID_KEYSTORE_B64" ]; then
            echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
            echo "KEYSTORE_GENERATED=false" >> $GITHUB_ENV
          else
            echo "ℹ️ Secret ANDROID_KEYSTORE_B64 não configurado — gerando keystore temporária."
            keytool -genkey -v \
              -keystore "$GITHUB_WORKSPACE/release.jks" \
              -alias passwordkeeper \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Password Keeper,O=Unknown,C=BR"
            echo "KEYSTORE_GENERATED=true" >> $GITHUB_ENV
          fi
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Build Android APK
        env:
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
        run: npm run tauri android build -- --apk

      - name: Alinhar e assinar APK
        shell: bash
        run: |
          KEY_ALIAS="${ANDROID_KEY_ALIAS:-passwordkeeper}"
          STORE_PASS="${ANDROID_STORE_PASSWORD:-android}"
          KEY_PASS="${ANDROID_KEY_PASSWORD:-android}"
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"

          # Localizar o APK gerado (universal release tem precedência)
          APK=$(find src-tauri/gen/android/app/build/outputs/apk \
                  -name "*universal*release*.apk" | head -1)
          [ -z "$APK" ] && APK=$(find src-tauri/gen/android/app/build/outputs/apk \
                                   -name "*release*.apk" | head -1)

          if [ -z "$APK" ]; then
            echo "❌ Nenhum APK encontrado em outputs/apk"
            find src-tauri/gen/android/app/build/outputs -name "*.apk" || true
            exit 1
          fi

          echo "APK de entrada: $APK"

          VERSION=$(echo "${{ github.ref_name }}" | tr -d 'v')
          FINAL="$GITHUB_WORKSPACE/PasswordKeeper-${VERSION}-android.apk"

          "$BUILD_TOOLS/zipalign" -v -f 4 "$APK" "$GITHUB_WORKSPACE/aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$GITHUB_WORKSPACE/release.jks" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$FINAL" \
            "$GITHUB_WORKSPACE/aligned.apk"

          echo "✓ APK assinado: $FINAL"
          echo "APK_PATH=$FINAL" >> $GITHUB_ENV
          echo "APK_NAME=PasswordKeeper-${VERSION}-android.apk" >> $GITHUB_ENV
        env:
          ANDROID_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Salvar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APK_PATH }}
          retention-days: 1

  # ── Publicar release ────────────────────────────────────────────────────────
  publish-release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest

    steps:
      - name: Baixar APK Android
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk-output

      - name: Anexar APK e publicar release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag = context.ref.replace('refs/tags/', '');

            // Encontrar o release draft criado pelo tauri-action
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              core.setFailed(`Release com tag ${tag} não encontrada`);
              return;
            }

            // Fazer upload do APK
            const apkFiles = fs.readdirSync('apk-output').filter(f => f.endsWith('.apk'));
            for (const apkFile of apkFiles) {
              const apkPath = path.join('apk-output', apkFile);
              const apkData = fs.readFileSync(apkPath);
              console.log(`Fazendo upload de ${apkFile}...`);
              await github.rest.repos.uploadReleaseAsset({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: release.id,
                name:       apkFile,
                data:       apkData,
                headers: { 'content-type': 'application/vnd.android.package-archive' },
              });
              console.log(`✓ ${apkFile} anexado.`);
            }

            // Publicar release
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: release.id,
              draft:      false,
            });
            console.log(`✓ Release ${tag} publicada!`);
