# ─────────────────────────────────────────────────────────────────────────────
# Password Keeper — Release workflow
#
# Dispara quando uma tag "v*" é criada na branch main (ex: v1.0.0, v0.2.3).
# Gera binários para: Linux (.AppImage + .deb), Windows (.msi), macOS (.dmg).
#
# GitHub Secrets necessários (Settings → Secrets and variables → Actions):
#   VITE_GOOGLE_CLIENT_ID      — Google OAuth Client ID
#   VITE_GOOGLE_CLIENT_SECRET  — Google OAuth Client Secret
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Cria a release no GitHub (draft) ─────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Criar release draft
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              tag_name:   tag,
              name:       `Password Keeper ${tag}`,
              body:       `## Password Keeper ${tag}\n\n### Downloads\n| Plataforma | Arquivo |\n|---|---|\n| Linux | \`.AppImage\` ou \`.deb\` |\n| Windows | \`.msi\` ou \`.exe\` |\n| macOS Intel | \`.dmg\` (x86_64) |\n| macOS Apple Silicon | \`.dmg\` (aarch64) |\n\n> Os arquivos aparecem abaixo em **Assets** após o build concluir.`,
              draft:      true,
              prerelease: tag.includes('-'),
            });
            return data.id;

  # ── 2. Build desktop: Linux, Windows, macOS ─────────────────────────────────
  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust_target: ''
            tauri_args: ''

          - os: windows-latest
            rust_target: ''
            tauri_args: ''

          - os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'

          - os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Instalar dependências Node
        run: npm ci

      - name: Build e publicar na release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.tauri_args }}

  # ── 3. Publica a release (remove o draft) ────────────────────────────────────
  publish-release:
    needs: [create-release, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Publicar release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft:      false,
            });
            console.log('✓ Release publicada!');
