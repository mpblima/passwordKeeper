# ─────────────────────────────────────────────────────────────────────────────
# Password Keeper — Release workflow
#
# Dispara quando uma tag "v*" é criada na branch main (ex: v1.0.0, v0.2.3).
# Gera binários para: Linux, Windows, macOS (Intel + Apple Silicon), Android e iOS.
#
# GitHub Secrets necessários (Settings → Secrets and variables → Actions):
#   VITE_GOOGLE_CLIENT_ID      — Google OAuth Client ID
#   VITE_GOOGLE_CLIENT_SECRET  — Google OAuth Client Secret
#
# Secrets adicionais para iOS (requer Apple Developer Program, US$99/ano):
#   APPLE_CERTIFICATE          — Certificado .p12 em base64
#   APPLE_CERTIFICATE_PASSWORD — Senha do certificado .p12
#   APPLE_PROVISIONING_PROFILE — Perfil de provisionamento em base64
#   APPLE_TEAM_ID              — Apple Developer Team ID
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main  # segurança: só processa tags que chegam pela main

permissions:
  contents: write

jobs:
  # ── 1. Cria a release no GitHub (draft) ─────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Criar release draft
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:    tag,
              name:        `Password Keeper ${tag}`,
              body:        `## Password Keeper ${tag}\n\n### Downloads\n| Plataforma | Arquivo |\n|---|---|\n| Linux | \`.AppImage\` ou \`.deb\` |\n| Windows | \`.msi\` |\n| macOS Intel | \`.dmg\` (x86_64) |\n| macOS Apple Silicon | \`.dmg\` (aarch64) |\n| Android | \`.apk\` |\n\n> Os arquivos aparecem abaixo em "Assets" após o build concluir.`,
              draft:      true,
              prerelease: tag.includes('-'),
            });
            return data.id;

  # ── 2. Desktop: Linux, Windows, macOS ───────────────────────────────────────
  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — AppImage + .deb
          - os: ubuntu-22.04
            rust_target: ''
            tauri_args: ''

          # Windows — .msi + .exe
          - os: windows-latest
            rust_target: ''
            tauri_args: ''

          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'

          # macOS Intel
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Dependências de sistema necessárias no Linux
      - name: Instalar dependências Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Instalar dependências Node
        run: npm ci

      - name: Build e publicar na release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.tauri_args }}

  # ── 3. Android ───────────────────────────────────────────────────────────────
  build-android:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Java 17 é obrigatório para o Android Gradle Plugin
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Configura ANDROID_HOME e ferramentas de linha de comando
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # Instala NDK e plataforma Android necessários pelo Tauri
      - name: Instalar NDK e plataforma Android
        run: |
          sdkmanager \
            "ndk;27.0.12077973" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Instalar Rust stable + targets Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android
            armv7-linux-androideabi
            x86_64-linux-android
            i686-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências Node
        run: npm ci

      - name: Instalar Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      # Gera o projeto Android em src-tauri/gen/android/ (idempotente)
      - name: Inicializar projeto Android
        run: tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}

      - name: Build APK (release, não assinado)
        run: tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}

      # Localiza e faz upload de todos os APKs gerados para a release
      - name: Upload APKs para a release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            function findApks(dir) {
              let results = [];
              try {
                for (const file of fs.readdirSync(dir)) {
                  const full = path.join(dir, file);
                  if (fs.statSync(full).isDirectory()) {
                    results = results.concat(findApks(full));
                  } else if (file.endsWith('.apk')) {
                    results.push(full);
                  }
                }
              } catch (_) {}
              return results;
            }

            const apks = findApks('src-tauri/gen/android/app/build/outputs/apk');
            console.log('APKs encontrados:', apks);

            for (const apkPath of apks) {
              const name = `password-keeper-android-${path.basename(apkPath)}`;
              await github.rest.repos.uploadReleaseAsset({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: parseInt(process.env.RELEASE_ID),
                name,
                data:       fs.readFileSync(apkPath),
              });
              console.log(`✓ Upload: ${name}`);
            }

  # ── 4. iOS ────────────────────────────────────────────────────────────────────
  # Requer Apple Developer Program (US$99/ano) e configuração dos secrets acima.
  # Para desabilitar, comente ou remova este job.
  build-ios:
    needs: create-release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Rust stable + targets iOS
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-ios
            aarch64-apple-ios-sim
            x86_64-apple-ios

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências Node
        run: npm ci

      - name: Instalar Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      # Importa o certificado de distribuição para o keychain
      - name: Importar certificado Apple
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" build.keychain
          rm certificate.p12

      # Instala o perfil de provisionamento
      - name: Instalar perfil de provisionamento
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # Gera o projeto Xcode em src-tauri/gen/apple/ (idempotente)
      - name: Inicializar projeto iOS
        run: tauri ios init
        env:
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}

      - name: Build IPA (ad-hoc)
        run: tauri ios build --export-method ad-hoc
        env:
          APPLE_TEAM_ID:             ${{ secrets.APPLE_TEAM_ID }}
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}

      - name: Upload IPA para a release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            function findIpas(dir) {
              let results = [];
              try {
                for (const file of fs.readdirSync(dir)) {
                  const full = path.join(dir, file);
                  if (fs.statSync(full).isDirectory()) {
                    results = results.concat(findIpas(full));
                  } else if (file.endsWith('.ipa')) {
                    results.push(full);
                  }
                }
              } catch (_) {}
              return results;
            }

            const ipas = findIpas('src-tauri/gen/apple');
            console.log('IPAs encontrados:', ipas);

            for (const ipaPath of ipas) {
              const name = `password-keeper-ios-${path.basename(ipaPath)}`;
              await github.rest.repos.uploadReleaseAsset({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: parseInt(process.env.RELEASE_ID),
                name,
                data:       fs.readFileSync(ipaPath),
              });
              console.log(`✓ Upload: ${name}`);
            }

  # ── 5. Publica a release (remove o draft) ────────────────────────────────────
  publish-release:
    needs: [build-desktop, build-android]
    # iOS é opcional — não bloqueia a publicação
    runs-on: ubuntu-latest
    steps:
      - name: Publicar release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft:      false,
            });
            console.log('✓ Release publicada!');
