# ─────────────────────────────────────────────────────────────────────────────
# Password Keeper — Release workflow
#
# Dispara quando uma tag "v*" é criada (ex: v1.0.0, v0.2.3).
# Gera binários para: Linux (.AppImage + .deb), Windows (.msi + .exe), macOS (.dmg).
#
# Pré-requisito no repositório:
#   Settings → Actions → General → Workflow permissions → Read and write permissions
#
# GitHub Secrets necessários:
#   VITE_GOOGLE_CLIENT_ID      — Google OAuth Client ID
#   VITE_GOOGLE_CLIENT_SECRET  — Google OAuth Client Secret
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust_target: ''
            tauri_args: ''

          - os: windows-latest
            rust_target: ''
            tauri_args: ''

          - os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'

          - os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Instalar dependências Node
        run: npm ci

      - name: Sincronizar versão com a tag
        run: |
          node -e "
            const fs = require('fs');
            const ver = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = ver;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \"[^\"]+\"/m, 'version = \"' + ver + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            console.log('Versão atualizada para', ver);
          "

      - name: Build e publicar na release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_CLIENT_ID:     ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Password Keeper ${{ github.ref_name }}'
          releaseBody: |
            ## Password Keeper ${{ github.ref_name }}

            ### Downloads
            | Plataforma | Arquivo |
            |---|---|
            | Linux | `.AppImage` ou `.deb` |
            | Windows | `.msi` ou `.exe` |
            | macOS Intel | `.dmg` (x86_64) |
            | macOS Apple Silicon | `.dmg` (aarch64) |

            > Os arquivos aparecem abaixo em **Assets** após todos os builds concluírem.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.tauri_args }}

  publish-release:
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Publicar release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) { core.setFailed(`Release com tag ${tag} não encontrada`); return; }
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: release.id,
              draft:      false,
            });
            console.log(`✓ Release ${tag} publicada!`);
