<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d0d24"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="40%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#a16207"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#fef08a"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="18" y="18" width="988" height="988" rx="208" ry="208"
        fill="none" stroke="#2a2a5e" stroke-width="3"/>

  <!-- Vault body -->
  <rect x="220" y="280" width="584" height="464" rx="48" ry="48"
        fill="url(#gold)" filter="url(#shadow)"/>

  <!-- Vault inner panel -->
  <rect x="252" y="312" width="520" height="400" rx="32" ry="32"
        fill="#1a1a3e" stroke="#ca8a04" stroke-width="3"/>

  <!-- Central lock wheel -->
  <circle cx="512" cy="500" r="110" fill="url(#gold)" filter="url(#shadow)"/>
  <circle cx="512" cy="500" r="78" fill="#1a1a3e" stroke="#ca8a04" stroke-width="3"/>
  <circle cx="512" cy="500" r="30" fill="url(#goldShine)"/>

  <!-- Lock spokes -->
  <line x1="512" y1="390" x2="512" y2="422" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="512" y1="578" x2="512" y2="610" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="402" y1="500" x2="434" y2="500" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="590" y1="500" x2="622" y2="500" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="434" y1="422" x2="456" y2="444" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="568" y1="556" x2="590" y2="578" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="590" y1="422" x2="568" y2="444" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
  <line x1="456" y1="556" x2="434" y2="578" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>

  <!-- Vault handle (right side) -->
  <rect x="770" y="454" width="44" height="92" rx="22" ry="22"
        fill="url(#gold)" filter="url(#shadow)"/>

  <!-- Vault hinges (left side) -->
  <rect x="210" y="330" width="28" height="44" rx="10" ry="10" fill="url(#goldShine)"/>
  <rect x="210" y="650" width="28" height="44" rx="10" ry="10" fill="url(#goldShine)"/>

  <!-- Shine highlight on vault door -->
  <rect x="268" y="328" width="180" height="8" rx="4" fill="#fef9c3" opacity="0.25"/>
</svg>
